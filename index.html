<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Portfolio</title>

  <style>
/* BASE */
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

/* NAV */
nav {
  background:#020617;
  padding:15px;
  text-align:center;
}

nav a {
  color:#fff;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
  position: relative;
  transition: 0.3s;
}

nav a:hover {
  color:#22c55e;
}

/* underline animado */
nav a::after {
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  bottom:-5px;
  left:0;
  background:#22c55e;
  transition:0.3s;
}

nav a:hover::after {
  width:100%;
}

/* HEADER */
header {
  text-align:center;
  padding:60px 20px;
}

/* CONTAINER */
.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* CARDS */
.card {
  background:#1e293b;
  padding:20px;
  margin-bottom:20px;
  border-radius:12px;
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* BOTÃO */
.btn {
  display:inline-block;
  padding:10px 18px;
  background:#22c55e;
  color:#000;
  text-decoration:none;
  border-radius:8px;
  margin-top:10px;
  transition: all 0.3s ease;
}

.btn:hover {
  background:#16a34a;
  transform: scale(1.05);
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  color:#94a3b8;
}

/* ANIMAÇÃO DE ENTRADA */
header, .card, footer {
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.8s ease forwards;
}

header { animation-delay:0.2s; }
.card:nth-child(1) { animation-delay:0.4s; }
.card:nth-child(2) { animation-delay:0.6s; }
footer { animation-delay:0.8s; }

@keyframes fadeUp {
  to {
    opacity:1;
    transform:translateY(0);
  }
}
  </style>
</head>

<body>
